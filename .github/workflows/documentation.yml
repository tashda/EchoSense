name: "Docs: Generate & Deploy to GitHub Pages"

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    name: "📚 Build & Deploy Documentation"
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer
          xcodebuild -version

      - name: Cache Swift dependencies
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: "🔨 Build Package"
        run: swift build

      - name: "🔨 Generating DocC Website"
        run: |
          mkdir -p docs
          swift package --allow-writing-to-package-directory \
            generate-documentation --target EchoSense \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path /EchoSense \
            --output-path "$(pwd)/docs"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: "🌐 Publishing to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4
