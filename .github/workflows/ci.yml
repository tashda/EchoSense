name: "Developer Workflow: Integration & Validation"

on:
  push:
    branches: ["dev", "main"]
  pull_request:
    branches: ["main", "dev"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "Step 1: Compilation Check (Swift 6.2)"
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer

      - name: Build library
        run: swift build

      - name: Build tests
        run: swift build --build-tests

  concurrency-check:
    name: "Step 2: Strict Concurrency Check"
    needs: build
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer

      - name: Build with strict concurrency
        run: swift build -Xswiftc -strict-concurrency=complete

  smoke-tests:
    name: "Step 3: Rapid Functional Validation"
    needs: build
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer

      - name: Run tests
        run: swift test
